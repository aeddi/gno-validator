name: gno-validator

services:
    gnokms:
        build:
            context: .
            target: gnokms
            args:
                GNO_VERSION: ${GNO_VERSION:-master}
                GNO_REPO: ${GNO_REPO:-gnolang/gno}
        image: gno-validator-gnokms
        environment:
            GNOKMS_PASSWORD: ${GNOKMS_PASSWORD}
        volumes:
            - ./gnokms-data:/gnokms-data
            - gnokms-sock:/sock
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '1g'
                max-file: '1'

    gnoland:
        build:
            context: .
            target: gnoland
            args:
                GNO_VERSION: ${GNO_VERSION:-master}
                GNO_REPO: ${GNO_REPO:-gnolang/gno}
        image: gno-validator-gnoland
        environment:
            GNOLAND_EARLY_START: ${GNOLAND_EARLY_START}
        command:
            - gnoland
            - start
            - --skip-genesis-sig-verification
            - -data-dir
            - /gnoland-data
            - -genesis
            - /genesis.json
        volumes:
            - ./gnoland-data:/gnoland-data
            - ./genesis.json:/genesis.json:ro
            - gnokms-sock:/sock
        ports:
            - '${GNOLAND_RPC_PORT:-26657}:26657'
            - '${GNOLAND_P2P_PORT:-26656}:26656'
        depends_on:
            gnokms:
                condition: service_started
            otelcol:
                condition: service_started
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '1g'
                max-file: '30'

    otelcol:
        image: otel/opentelemetry-collector-contrib:latest
        volumes:
            - ./telemetry/otelcol-config.yml:/etc/otelcol-contrib/config.yaml:ro
        depends_on:
            tempo:
                condition: service_started
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '100m'
                max-file: '1'

    tempo:
        image: grafana/tempo:latest
        command: ['-config.file=/etc/tempo.yaml']
        volumes:
            - ./telemetry/tempo.yml:/etc/tempo.yaml:ro
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '100m'
                max-file: '1'

    prometheus:
        image: prom/prometheus:latest
        volumes:
            - ./telemetry/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        depends_on:
            otelcol:
                condition: service_started
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '100m'
                max-file: '1'

    grafana:
        image: grafana/grafana:latest
        environment:
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
        volumes:
            - grafana_data:/var/lib/grafana
            - ./grafana/provisioning:/etc/grafana/provisioning:ro
        ports:
            - '${GRAFANA_PORT:-3000}:3000'
        depends_on:
            prometheus:
                condition: service_started
            tempo:
                condition: service_started
        restart: unless-stopped
        logging:
            driver: json-file
            options:
                max-size: '100m'
                max-file: '1'

volumes:
    gnokms-sock:
    grafana_data:
